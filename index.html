<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chinchón</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont;
  margin: 0;
  background: #f2f2f2;
}

header {
  background: #2d89ef;
  color: white;
  text-align: center;
  padding: 15px;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 15px;
}

.card {
  background: white;
  border-radius: 12px;
  padding: 15px;
  margin-bottom: 15px;
}

input {
  width: 100%;
  padding: 14px;
  font-size: 18px;
  margin-top: 8px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  background: #2d89ef;
  color: white;
}

button:active {
  transform: scale(0.98);
}

.danger {
  background: #e74c3c;
}

.player {
  display: flex;
  justify-content: space-between;
  padding: 12px;
  border-bottom: 1px solid #eee;
  font-size: 18px;
}

.winner {
  background: #d4edda;
  border-radius: 8px;
}

label {
  margin-top: 10px;
  display: block;
  font-weight: bold;
}
</style>
</head>

<body>

<header>Chinchón</header>

<div class="container">

<div class="card">
  <input id="nombre" placeholder="Nombre jugador">
  <button onclick="addPlayer()">Añadir jugador</button>
</div>

<div class="card">
  <div id="roundInputs"></div>
  <button onclick="addRound()">Guardar ronda</button>
</div>

<div class="card">
  <div id="ranking"></div>
</div>

<div class="card">
  <button class="danger" onclick="reset()">Reiniciar partida</button>
</div>

</div>

<script>
let players = JSON.parse(localStorage.getItem("chinchon")) || [];

function save() {
  localStorage.setItem("chinchon", JSON.stringify(players));
}

function addPlayer() {
  const name = document.getElementById("nombre").value.trim();
  if (!name) return;

  players.push({ name, points: 0 });
  document.getElementById("nombre").value = "";
  save();
  render();
}

function render() {
  const ranking = document.getElementById("ranking");
  const roundInputs = document.getElementById("roundInputs");

  ranking.innerHTML = "";
  roundInputs.innerHTML = "";

  players.sort((a,b)=>a.points-b.points);

  players.forEach((p,i)=>{
    const div = document.createElement("div");
    div.className = "player" + (i===0 ? " winner":"");
    div.innerHTML = `<span>${p.name}</span><span>${p.points}</span>`;
    ranking.appendChild(div);

    roundInputs.innerHTML += `
      <label>${p.name}</label>
      <input type="number" id="p-${i}" placeholder="Puntos">
    `;
  });
}

function addRound() {
  players.forEach((p,i)=>{
    const val = parseInt(document.getElementById("p-"+i).value) || 0;
    p.points += val;
  });

  save();
  render();
}

function reset() {
  if(confirm("¿Reiniciar partida?")) {
    players = [];
    save();
    render();
  }
}

render();
</script>

</body>
</html>
