<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chinchón</title>

<style>
body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  margin: 0;
  background: #f2f2f2;
  color: #222;
}

* {
  box-sizing: border-box;
}

header {
  background: #2d89ef;
  color: white;
  text-align: center;
  padding: 14px 12px;
  font-size: clamp(20px, 6vw, 26px);
  font-weight: 700;
  line-height: 1.2;
  letter-spacing: 0;
}

.container {
  width: min(100%, 560px);
  margin: 0 auto;
  padding: 12px;
}

.card {
  background: white;
  border-radius: 10px;
  padding: 14px;
  margin-bottom: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}

input {
  width: 100%;
  min-height: 46px;
  padding: 12px;
  font-size: 16px;
  margin-top: 8px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  min-height: 46px;
  padding: 12px;
  margin-top: 10px;
  font-size: 16px;
  border: none;
  border-radius: 8px;
  background: #2d89ef;
  color: white;
  cursor: pointer;
}

button:active {
  transform: scale(0.98);
}

button:hover {
  background: #1b5fa7;
}

.danger {
  background: #e74c3c;
}

.danger:hover {
  background: #a94442;
}

.table-wrap {
  width: 100%;
  overflow-x: auto;
}

table {
  width: 100%;
  min-width: 260px;
  border-collapse: collapse;
  background: white;
}

th,
td {
  border: 1px solid #ddd;
  padding: 11px 8px;
  text-align: center;
  font-size: 16px;
  overflow-wrap: anywhere;
}

th {
  background: #333;
  color: white;
  font-weight: bold;
}

.winner {
  background: #d4edda;
  font-weight: bold;
}

label {
  margin-top: 10px;
  display: block;
  font-weight: bold;
  overflow-wrap: anywhere;
}

@media (max-width: 360px) {
  .container {
    padding: 8px;
  }

  .card {
    padding: 10px;
    margin-bottom: 10px;
  }

  input,
  button,
  th,
  td {
    font-size: 15px;
  }

  th,
  td {
    padding: 9px 6px;
  }
}
</style>
</head>

<body>

<header>Chinchón</header>

<div class="container">

<div class="card">
  <input id="nombre" placeholder="Nombre jugador">
  <button onclick="addPlayer()">Añadir jugador</button>
</div>

<div class="card">
  <div id="roundInputs"></div>
  <button onclick="addRound()">Guardar ronda</button>
</div>

<div class="card">
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Jugador</th>
          <th>Puntos</th>
        </tr>
      </thead>
      <tbody id="ranking"></tbody>
    </table>
  </div>
</div>

<div class="card">
  <button class="danger" onclick="reset()">Reiniciar partida</button>
</div>

</div>

<script>
let players = JSON.parse(localStorage.getItem("chinchon")) || [];

function save() {
  localStorage.setItem("chinchon", JSON.stringify(players));
}

function addPlayer() {
  const name = document.getElementById("nombre").value.trim();
  if (!name) return;

  players.push({ name, points: 0 });
  document.getElementById("nombre").value = "";
  save();
  render();
}

function render() {
  const ranking = document.getElementById("ranking");
  const roundInputs = document.getElementById("roundInputs");

  ranking.innerHTML = "";
  roundInputs.innerHTML = "";

  players.sort((a,b)=>a.points-b.points);

  players.forEach((p,i)=>{
    const row = document.createElement("tr");
    if (i === 0) row.classList.add("winner");
    row.innerHTML = `<td>${p.name}</td><td>${p.points}</td>`;
    ranking.appendChild(row);

    roundInputs.innerHTML += `
      <label>${p.name}</label>
      <input type="number" id="p-${i}" placeholder="Puntos">
    `;
  });
}

function addRound() {
  players.forEach((p,i)=>{
    const val = parseInt(document.getElementById("p-"+i).value) || 0;
    p.points += val;
  });

  save();
  render();
}

function reset() {
  if(confirm("¿Reiniciar partida?")) {
    players = [];
    save();
    render();
  }
}

render();
</script>

</body>
</html>
